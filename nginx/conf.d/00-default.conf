###############################################################################
# 00-default.conf — servidor padrão (catch-all)
#  - Porta 80: responde ao desafio ACME, healthcheck e redireciona p/ HTTPS
#  - Porta 443: rejeita hosts desconhecidos (SNI não mapeado) com 444
###############################################################################

# ── HTTP (porta 80) ────────────────────────────────────────────────────────
server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    # Healthcheck interno (usado pelo Docker HEALTHCHECK)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Desafio HTTP-01 do Let's Encrypt (antes do redirect)
    include /etc/nginx/snippets/acme-challenge.conf;

    # Todo o resto vai para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS padrão (porta 443) — rejeita SNI desconhecido ─────────────────────
server {
    listen      443 ssl default_server;
    listen      [::]:443 ssl default_server;
    http2       on;
    server_name _;

    # Certificado self-signed local (gerado por scripts/make-selfsigned.sh)
    ssl_certificate     /etc/nginx/certs/local/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/local/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    # 444 = fecha a conexão sem resposta (evita exposição a scanners)
    return 444;
}
