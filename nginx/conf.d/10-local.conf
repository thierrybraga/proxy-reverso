###############################################################################
# 10-local.conf — site local de teste (https://localhost)
# Funciona "de fábrica" com certificado self-signed, sem precisar de domínio.
# Serve a página de boas-vindas e demonstra os snippets de segurança.
###############################################################################

server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name localhost 127.0.0.1;

    ssl_certificate     /etc/nginx/certs/local/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/local/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # Proteções de taxa por IP
    limit_req  zone=req_per_ip burst=20 nodelay;
    limit_conn conn_per_ip 20;

    root  /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
