###############################################################################
# nginx.conf — configuração principal (contexto main + http)
# Otimizado para um reverse proxy de lab com poucos recursos.
###############################################################################

user                 nginx;
worker_processes     auto;             # 1 worker por núcleo disponível
worker_rlimit_nofile 65535;
pid                  /var/run/nginx.pid;

# Carrega módulos dinâmicos, se houver
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 4096;   # conexões simultâneas por worker
    multi_accept       on;
    use                epoll;  # melhor I/O em Linux/WSL2
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;

    # ── Hardening básico ──────────────────────────────────────────────────
    server_tokens       off;          # não revela a versão do nginx
    client_max_body_size 50m;         # ajuste conforme uploads das apps
    client_body_timeout  15s;
    client_header_timeout 15s;
    send_timeout         15s;
    large_client_header_buffers 4 16k;

    # ── Logs (com IP real do cliente) ─────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Compressão ────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml application/wasm;

    # ── Suporte a WebSocket (Upgrade) ─────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Rate limiting (zonas usadas nos server/location) ──────────────────
    # 10 req/s por IP, com burst configurável nos blocos. Zona "geral" = 10MB.
    limit_req_zone  $binary_remote_addr zone=req_per_ip:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
    limit_req_status  429;
    limit_conn_status 429;

    # ── IP real por trás da Cloudflare ────────────────────────────────────
    include /etc/nginx/snippets/cloudflare-realip.conf;

    # ── Virtual hosts ─────────────────────────────────────────────────────
    # Apenas arquivos *.conf são carregados; *.conf.example são templates.
    include /etc/nginx/conf.d/*.conf;
}
