###############################################################################
# ssl.conf — parâmetros de TLS endurecidos (incluir em todo server HTTPS)
# Objetivo: nota A/A+ no SSL Labs sem quebrar clientes modernos.
###############################################################################

# Apenas protocolos modernos
ssl_protocols              TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers  off;        # com TLS1.3 o cliente escolhe; ok

# Cifras seguras (TLS1.2); TLS1.3 usa o conjunto próprio do OpenSSL
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

ssl_ecdh_curve             X25519:secp384r1;

# Sessões
ssl_session_timeout        1d;
ssl_session_cache          shared:SSL:10m;
ssl_session_tickets        off;

# OCSP stapling (validação de revogação mais rápida)
ssl_stapling               on;
ssl_stapling_verify        on;
resolver                   1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout           5s;

# Diffie-Hellman: opcional. Gere com scripts/generate-dhparam.sh e descomente.
# (Não é necessário com TLS1.3/ECDHE; deixar comentado evita erro se faltar.)
# ssl_dhparam              /etc/nginx/certs/dhparam.pem;
