###############################################################################
# security-headers.conf — cabeçalhos de segurança (incluir em servers HTTPS)
# "always" garante o header mesmo em respostas de erro (4xx/5xx).
###############################################################################

# Força HTTPS por 2 anos (só envie em HTTPS!). Remova includeSubDomains se
# tiver subdomínios que ainda usam HTTP. Cuidado com "preload": é difícil reverter.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

# Anti-clickjacking e anti-sniffing
add_header X-Frame-Options           "SAMEORIGIN" always;
add_header X-Content-Type-Options    "nosniff"    always;

# Vazamento de referer e políticas de permissão
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

# X-XSS-Protection: 0 é o recomendado hoje (a heurística antiga causava bugs)
add_header X-XSS-Protection          "0" always;

# Content-Security-Policy: MUITO eficaz, porém pode quebrar apps.
# Comece permissivo e aperte aos poucos. Descomente para ativar:
# add_header Content-Security-Policy  "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;

# Esconde o servidor de origem nos headers de resposta
proxy_hide_header X-Powered-By;
