###############################################################################
# proxy.conf — parâmetros padrão de reverse proxy (incluir em location de proxy)
# Repassa cabeçalhos corretos para a aplicação de origem e suporta WebSocket.
###############################################################################

proxy_http_version 1.1;

# Cabeçalhos repassados à origem
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  $server_port;

# Suporte a WebSocket / Upgrade (usa o map definido no nginx.conf)
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# Não repassa o header Authorization do proxy para a origem se vazio
proxy_set_header Accept-Encoding "";

# Timeouts (ajuste para apps lentas, ex.: uploads grandes)
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Buffers
proxy_buffering       on;
proxy_buffer_size     16k;
proxy_buffers         8 16k;
proxy_busy_buffers_size 32k;

# Repassa o status real da origem em caso de erro
proxy_intercept_errors off;
