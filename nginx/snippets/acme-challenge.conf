###############################################################################
# acme-challenge.conf — serve o desafio HTTP-01 do Let's Encrypt
# Inclua no server da porta 80 ANTES do redirect para HTTPS.
###############################################################################

location ^~ /.well-known/acme-challenge/ {
    default_type "text/plain";
    root /var/www/acme;          # mapeado para ./data/acme-webroot
    allow all;
}
